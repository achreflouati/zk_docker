x-backend-defaults: &backend-defaults
  image: achreflouati/zk-hrms:v15
  restart: unless-stopped
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - ./init-site.sh:/workspace/init-site.sh:ro
  environment:
    - DB_HOST=db
    - DB_PORT=3306
    - REDIS_CACHE=redis-cache:6379
    - REDIS_QUEUE=redis-queue:6379
    - SOCKETIO_PORT=9000

services:

  db:
    image: mariadb:10.6
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped

  configurator:
    <<: *backend-defaults
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host db;
        bench set-config -gp db_port 3306;
        bench set-config -g redis_cache "redis://redis-cache:6379";
        bench set-config -g redis_queue "redis://redis-queue:6379";
        bench set-config -g redis_socketio "redis://redis-queue:6379";
        bench set-config -gp socketio_port 9000;
    depends_on:
      db:
        condition: service_healthy

  backend:
    <<: *backend-defaults
    entrypoint: ["bash", "-c"]
    command:
      - >
        cd /home/frappe/frappe-bench/apps/zk_hrms &&
        git pull --ff-only 2>/dev/null || true &&
        cd /home/frappe/frappe-bench &&
        bench serve --port 8000
    cap_add:
      - NET_RAW
    depends_on:
      configurator:
        condition: service_completed_successfully

  websocket:
    <<: *backend-defaults
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    depends_on:
      - backend

  worker-short:
    <<: *backend-defaults
    entrypoint: ["bash", "-c"]
    command:
      - >
        cd /home/frappe/frappe-bench/apps/zk_hrms &&
        git pull --ff-only 2>/dev/null || true &&
        cd /home/frappe/frappe-bench &&
        bench worker --queue short,default
    cap_add:
      - NET_RAW
    depends_on:
      - backend

  worker-long:
    <<: *backend-defaults
    entrypoint: ["bash", "-c"]
    command:
      - >
        cd /home/frappe/frappe-bench/apps/zk_hrms &&
        git pull --ff-only 2>/dev/null || true &&
        cd /home/frappe/frappe-bench &&
        bench worker --queue long,default
    cap_add:
      - NET_RAW
    depends_on:
      - backend

  scheduler:
    <<: *backend-defaults
    command: ["bench", "schedule"]
    depends_on:
      - backend

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - sites:/usr/share/nginx/sites:ro
    depends_on:
      - backend
      - websocket

volumes:
  db-data:
  sites:
