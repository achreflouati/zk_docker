x-backend-defaults: &backend-defaults
  image: achreflouati/zk-hrms:v15
  restart: unless-stopped
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - ./init-site.sh:/workspace/init-site.sh:ro
  environment:
    - DB_HOST=db
    - DB_PORT=3306
    - REDIS_CACHE=redis-cache:6379
    - REDIS_QUEUE=redis-queue:6379
    - SOCKETIO_PORT=9000

services:

  db:
    image: mariadb:10.6
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped

  configurator:
    <<: *backend-defaults
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host db;
        bench set-config -gp db_port 3306;
        bench set-config -g redis_cache "redis://redis-cache:6379";
        bench set-config -g redis_queue "redis://redis-queue:6379";
        bench set-config -g redis_socketio "redis://redis-queue:6379";
        bench set-config -gp socketio_port 9000;
    depends_on:
      db:
        condition: service_healthy

  # ── Création automatique du site (première installation uniquement) ──────────
  create-site:
    <<: *backend-defaults
    restart: "no"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - SOCKETIO_PORT=9000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        SITE="zkhrms.localhost"
        cd /home/frappe/frappe-bench

        # Idempotent — skip if site already exists
        if [ -f "sites/$$SITE/site_config.json" ]; then
          echo "✅  Site $$SITE already exists — skipping creation"
          exit 0
        fi

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo " ZK HRMS — Première installation"
        echo " Mot de passe administrateur : $${ADMIN_PASSWORD}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        echo ""
        echo "[1/6] Création du site..."
        bench new-site "$$SITE" \
          --db-root-password admin \
          --admin-password "$${ADMIN_PASSWORD}" \
          --no-mariadb-socket

        echo ""
        echo "[2/6] Installation ERPNext..."
        bench --site "$$SITE" install-app erpnext

        echo ""
        echo "[3/6] Installation HRMS..."
        bench --site "$$SITE" install-app hrms

        echo ""
        echo "[4/6] Installation ZK HRMS..."
        bench --site "$$SITE" install-app zk_hrms

        echo ""
        echo "[5/6] Configuration..."
        bench --site "$$SITE" set-config allow_cors 1
        bench use "$$SITE"

        echo ""
        echo "[6/6] Branding LSI HRMS..."
        bench --site "$$SITE" execute zk_hrms.setup_lsi.run 2>/dev/null || true

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo " ✅  Installation terminée !"
        echo ""
        echo " 🌐  URL          : http://localhost"
        echo " 👤  Login        : Administrator"
        echo " 🔑  Mot de passe : $${ADMIN_PASSWORD}"
        echo " 📊  Dashboard    : http://localhost/app/zk-dashboard"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    depends_on:
      configurator:
        condition: service_completed_successfully

  backend:
    <<: *backend-defaults
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        cd /home/frappe/frappe-bench/apps/zk_hrms
        BEFORE=$$(git rev-parse HEAD 2>/dev/null || echo "none")
        git pull --ff-only 2>/dev/null || true
        AFTER=$$(git rev-parse HEAD 2>/dev/null || echo "none")
        cd /home/frappe/frappe-bench
        if [ "$$BEFORE" != "$$AFTER" ] || [ ! -f sites/assets/zk_hrms/css/zk_hrms.css ] && [ ! -f sites/assets/zk_hrms/js/zk_dashboard.js ]; then
          echo "📦 Nouveaux commits détectés ou assets manquants — build en cours..."
          bench build --app zk_hrms --hard-link 2>/dev/null || true
        else
          echo "✅ Pas de changement JS/CSS — build ignoré (démarrage rapide)"
        fi
        exec bench serve --port 8000
    cap_add:
      - NET_RAW
    depends_on:
      create-site:
        condition: service_completed_successfully

  websocket:
    <<: *backend-defaults
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    depends_on:
      - backend

  worker-short:
    <<: *backend-defaults
    entrypoint: ["bash", "-c"]
    command:
      - >
        cd /home/frappe/frappe-bench/apps/zk_hrms &&
        git pull --ff-only 2>/dev/null || true &&
        cd /home/frappe/frappe-bench &&
        bench worker --queue short,default
    cap_add:
      - NET_RAW
    depends_on:
      - backend

  worker-long:
    <<: *backend-defaults
    entrypoint: ["bash", "-c"]
    command:
      - >
        cd /home/frappe/frappe-bench/apps/zk_hrms &&
        git pull --ff-only 2>/dev/null || true &&
        cd /home/frappe/frappe-bench &&
        bench worker --queue long,default
    cap_add:
      - NET_RAW
    depends_on:
      - backend

  scheduler:
    <<: *backend-defaults
    command: ["bench", "schedule"]
    depends_on:
      - backend

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - sites:/usr/share/nginx/sites:ro
    networks:
      default:
        aliases:
          - zkhrms.localhost
    depends_on:
      - backend
      - websocket

volumes:
  db-data:
  sites:
