upstream backend {
    server backend:8000;
}

upstream websocket {
    server websocket:9000;
}

server {
    listen 8080;
    listen 80;
    server_name localhost zkhrms.localhost;
    client_max_body_size 50m;

    location /socket.io {
        proxy_pass http://websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Host et Origin doivent correspondre pour passer le check Frappe
        # X-Frappe-Site-Name identifie le site indépendamment du hostname
        proxy_set_header Host $http_host;
        proxy_set_header Origin $scheme://$http_host;
        proxy_set_header X-Frappe-Site-Name zkhrms.localhost;
    }

    location / {
        proxy_pass http://backend;
        # X-Frappe-Site-Name permet l'accès par IP ou tout hostname
        proxy_set_header Host $http_host;
        proxy_set_header X-Frappe-Site-Name zkhrms.localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}
